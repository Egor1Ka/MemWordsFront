# MemWords production stack — lives in /opt/memwords/ on the Contabo VPS.
# No Caddy here: the box already runs ONE edge Caddy (slotix-caddy) on :80/:443.
# We give MemWords its own "memwords" network and connect slotix-caddy to it
# (docker network connect memwords slotix-caddy), then add a memwords.uk block
# to /opt/slotix/Caddyfile. Same pattern slotix-caddy already uses for dvir.
#
# Unique service/container names (memwords-web / memwords-api) on purpose: the
# edge Caddy is attached to several app networks, so generic "web"/"api" aliases
# would clash. Caddy references the unique names.
services:
  memwords-api:
    image: ghcr.io/egor1ka/memwords-back:latest
    container_name: memwords-api
    env_file:
      - .env.api
    pull_policy: always
    restart: unless-stopped
    networks: [memwords]

  memwords-web:
    image: ghcr.io/egor1ka/memwordsfront:latest
    container_name: memwords-web
    environment:
      NODE_ENV: production
      BACKEND_URL: http://memwords-api:9000
    pull_policy: always
    restart: unless-stopped
    networks: [memwords]
    depends_on: [memwords-api]

networks:
  # Pre-created once on the server (docker network create memwords) and shared
  # with the edge Caddy: docker network connect memwords slotix-caddy
  memwords:
    external: true
    name: memwords
